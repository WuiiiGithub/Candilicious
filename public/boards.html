<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> {{ title }} </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Coming+Soon&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['"Coming Soon"', 'cursive'],
                    },
                    colors: {
                        pink: {
                            50: '#FDF2F8', 100: '#FCE7F3', 200: '#FBCFEA', 300: '#F9A8D4', 400: '#F472B6',
                            500: '#EC4899', 600: '#DB2777', 700: '#BE185D', 800: '#9D174D', 900: '#831843',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/assets/favicon/favicon-64x64.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        body { padding: 0; } /* Reset for full width header */

        /* Fixed Mobile Centering */
        .is-mobile-view #kanbanScroll {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 0 24px 40px 24px;
            margin-top: 20px;
            gap: 20px;
        }

        .is-mobile-view .kanban-col-wrapper {
            min-width: calc(100vw - 48px); 
            scroll-snap-align: center;
            flex-shrink: 0;
        }

        .is-mobile-view #kanbanScroll::-webkit-scrollbar { display: none; }

        #progress-fill { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .task-card {
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            touch-action: pan-y;
        }

        .dragging { opacity: 0.4; transform: scale(0.98); }
        .drop-target { background: rgba(236, 72, 153, 0.05); border: 2px dashed #F472B6; }

        .swipe-out-right { transform: translateX(100%); opacity: 0; }
        .swipe-out-left { transform: translateX(-100%); opacity: 0; }

        .card-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            opacity: 0.5;
        }
        
        .card-dot.active {
            opacity: 1;
            transform: scale(1.3);
            box-shadow: 0 0 0 2px white, 0 0 0 3px currentColor;
        }

        /* Fixed Icon Visibility for Mobile */
        .action-btn {
            opacity: 0.8; 
            transition: all 0.2s ease;
        }
        @media (min-width: 1024px) {
            .action-btn { opacity: 0.2; }
            .task-card:hover .action-btn { opacity: 1; }
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-pink-50 font-sans text-gray-800 min-h-screen flex flex-col overflow-x-hidden">
    <header class="nav-glass sticky top-0 z-[100] w-full">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 md:h-20 flex justify-between items-center">
            <!-- Brand -->
           <div class="flex items-center space-x-2">

                <img src="./assets/favicon/android-chrome-192x192.png"
                    alt="Candilicious Icon"
                    class="w-10 h-10 rounded-full shadow-md">
                <h1
                    class="font-display text-2xl md:text-3xl font-black text-pink-600"
                    style="text-shadow: 1px 1px 2px rgba(236, 72, 153, 0.3);">
                    Candilicious
                </h1>
            </div>

            <!-- Progress Bar Integrated into Nav -->
            <div class="hidden sm:flex items-center gap-4 w-64 md:w-80">
                <div class="flex-1">
                    <div class="flex justify-between text-[10px] font-bold text-pink-500 uppercase tracking-widest mb-1">
                        <span>Progress</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="h-2 w-full bg-pink-100 rounded-full overflow-hidden border border-pink-200/50">
                        <div id="progress-fill" class="h-full bg-gradient-to-r from-pink-400 to-pink-600 shadow-[0_0_8px_rgba(236,72,153,0.4)]" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Mobile Progress Indicator -->
            <div class="sm:hidden flex items-center bg-pink-100 px-3 py-1 rounded-full text-pink-600 text-xs font-bold font-sans">
                <span id="progress-percent-mobile">0%</span>
            </div>
        </div>
    </header>

    <div class="p-4 md:p-8 max-w-7xl mx-auto w-full">
        <!-- Unified Input Panel -->
        <div class="w-full max-w-2xl mx-auto mb-8">
            <div class="flex items-center glass rounded-2xl shadow-sm border border-pink-200 overflow-hidden h-14 md:h-16 transition-all focus-within:ring-2 focus-within:ring-pink-300">
                <input type="text" id="taskInput" placeholder="What are we baking?..." 
                       class="flex-1 px-5 md:px-8 h-full bg-transparent border-none focus:ring-0 text-sm md:text-base outline-none font-medium placeholder:text-pink-300">
                <button id="addTaskBtn" class="bg-pink-500 hover:bg-pink-600 text-white w-14 md:w-20 h-full flex items-center justify-center transition-all shadow-inner active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Navigation Dots -->
        <div id="mobile-dots" class="hidden justify-center gap-3 mb-6">
            <div id="dot-nav-todo" class="w-2.5 h-2.5 rounded-full bg-pink-500 transition-all"></div>
            <div id="dot-nav-cooking" class="w-2.5 h-2.5 rounded-full bg-pink-200 transition-all"></div>
            <div id="dot-nav-done" class="w-2.5 h-2.5 rounded-full bg-pink-200 transition-all"></div>
        </div>

        <!-- Kanban Main Container -->
        <main id="kanbanScroll" class="flex-1 w-full md:grid md:grid-cols-3 md:gap-8 lg:gap-10">
            
            <!-- Column: To-Do -->
            <div class="kanban-col-wrapper flex flex-col gap-4">
                <h2 class="font-display text-xl md:text-2xl font-bold text-pink-700 px-4 flex justify-between items-center">
                    To-Do <span class="text-xs md:text-sm bg-pink-200 text-pink-800 px-3 py-1 rounded-full font-sans font-bold" id="todo-count">0</span>
                </h2>
                <div id="todo" class="kanban-column flex flex-col gap-4 p-5 md:p-6 glass rounded-[2.5rem] min-h-[400px] md:h-[60vh] overflow-y-auto border-pink-100 shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <!-- Column: Cooking -->
            <div class="kanban-col-wrapper flex flex-col gap-4">
                <h2 class="font-display text-xl md:text-2xl font-bold text-purple-600 px-4 flex justify-between items-center">
                    Cooking <span class="text-xs md:text-sm bg-purple-200 text-purple-800 px-3 py-1 rounded-full font-sans font-bold" id="cooking-count">0</span>
                </h2>
                <div id="cooking" class="kanban-column flex flex-col gap-4 p-5 md:p-6 glass rounded-[2.5rem] min-h-[400px] md:h-[60vh] overflow-y-auto border-purple-100 shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <!-- Column: Done -->
            <div class="kanban-col-wrapper flex flex-col gap-4">
                <h2 class="font-display text-xl md:text-2xl font-bold text-green-600 px-4 flex justify-between items-center">
                    Done <span class="text-xs md:text-sm bg-green-200 text-green-800 px-3 py-1 rounded-full font-sans font-bold" id="done-count">0</span>
                </h2>
                <div id="done" class="kanban-column flex flex-col gap-4 p-5 md:p-6 glass rounded-[2.5rem] min-h-[400px] md:h-[60vh] overflow-y-auto border-green-100 shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

        </main>
    </div>

    <script>
        let tasks = {{ data | tojson }};

        const columns = ['todo', 'cooking', 'done'];
        const scrollContainer = document.getElementById('kanbanScroll');
        const priorityMap = { 'red': 3, 'yellow': 2, 'green': 1 };
        const priorityColors = { 'red': 'bg-red-500', 'yellow': 'bg-yellow-400', 'green': 'bg-green-500' };

        function updateTaskPriority(taskId, color) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.priority = color;
                saveTasks();
                renderTasks();
            }
        }

        function handleResponsiveLayout() {
            const isMobile = window.innerWidth < 1024;
            if (isMobile) {
                document.body.classList.add('is-mobile-view');
                document.getElementById('mobile-dots').classList.remove('hidden');
                document.getElementById('mobile-dots').classList.add('flex');
            } else {
                document.body.classList.remove('is-mobile-view');
                document.getElementById('mobile-dots').classList.remove('flex');
                document.getElementById('mobile-dots').classList.add('hidden');
            }
        }

        scrollContainer.addEventListener('scroll', () => {
            if (!document.body.classList.contains('is-mobile-view')) return;
            const containerWidth = scrollContainer.offsetWidth;
            const scrollLeft = scrollContainer.scrollLeft;
            const center = scrollLeft + (containerWidth / 2);
            
            let activeIdx = 0;
            let minDiff = Infinity;
            
            document.querySelectorAll('.kanban-col-wrapper').forEach((el, idx) => {
                const elCenter = el.offsetLeft + (el.offsetWidth / 2);
                const diff = Math.abs(center - elCenter);
                if (diff < minDiff) {
                    minDiff = diff;
                    activeIdx = idx;
                }
            });

            columns.forEach((col, idx) => {
                const dot = document.getElementById(`dot-nav-${col}`);
                if (dot) dot.className = `w-2.5 h-2.5 rounded-full transition-all ${idx === activeIdx ? 'bg-pink-500 w-6' : 'bg-pink-200'}`;
            });
        });

        function saveTasks() {
            localStorage.setItem('candilicious_tasks', JSON.stringify(tasks));
            updateUI();
        }

        function updateUI() {
            columns.forEach(col => {
                const count = tasks.filter(t => t.status === col).length;
                const countEl = document.getElementById(`${col}-count`);
                if(countEl) countEl.innerText = count;
            });
            const total = tasks.length;
            const done = tasks.filter(t => t.status === 'done').length;
            const percentage = total === 0 ? 0 : Math.round((done / total) * 100);
            
            const fill = document.getElementById('progress-fill');
            const perc = document.getElementById('progress-percent');
            const percMob = document.getElementById('progress-percent-mobile');
            
            if(fill) fill.style.width = percentage + '%';
            if(perc) perc.innerText = percentage + '%';
            if(percMob) percMob.innerText = percentage + '%';
        }

        function renderTasks() {
            const sortedTasks = [...tasks].sort((a, b) => {
                const pA = priorityMap[a.priority] || 0;
                const pB = priorityMap[b.priority] || 0;
                if (pA !== pB) return pB - pA;
                return b.id - a.id;
            });

            columns.forEach(col => {
                const colEl = document.getElementById(col);
                if(!colEl) return;
                colEl.innerHTML = '';
                sortedTasks.filter(t => t.status === col).forEach(task => {
                    colEl.appendChild(createTaskElement(task));
                });
            });
            updateUI();
        }

        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = 'task-card bg-white rounded-3xl shadow-sm border border-pink-50 cursor-grab active:cursor-grabbing relative overflow-hidden group mb-1 hover:shadow-lg transition-all duration-300';
            div.draggable = true;
            div.id = `task-${task.id}`;
            
            const pColor = priorityColors[task.priority] || 'bg-gray-200';

            div.innerHTML = `
                <div class="absolute left-0 top-0 bottom-0 w-1.5 ${pColor}"></div>
                <div class="p-4 md:p-5 pr-14 relative">
                    <div class="mb-4 md:mb-5">
                        <p id="text-${task.id}" class="text-sm md:text-[16px] font-semibold text-gray-800 leading-snug break-words">${task.text}</p>
                        <textarea id="edit-input-${task.id}" class="hidden w-full px-3 py-2 border-2 border-pink-200 outline-none text-sm md:text-[16px] font-semibold bg-pink-50 rounded-xl resize-none" rows="2">${task.text}</textarea>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <div onclick="updateTaskPriority('${task.id}', 'red')" class="card-dot bg-red-500 text-red-500 ${task.priority === 'red' ? 'active' : ''}"></div>
                        <div onclick="updateTaskPriority('${task.id}', 'yellow')" class="card-dot bg-yellow-400 text-yellow-400 ${task.priority === 'yellow' ? 'active' : ''}"></div>
                        <div onclick="updateTaskPriority('${task.id}', 'green')" class="card-dot bg-green-500 text-green-500 ${task.priority === 'green' ? 'active' : ''}"></div>
                    </div>

                    <div class="absolute right-2 md:right-3 top-0 bottom-0 flex flex-col justify-center gap-2 border-l border-gray-50 pl-2 md:pl-3">
                        <button onclick="toggleEdit('${task.id}')" id="btn-edit-${task.id}" class="action-btn p-2 rounded-xl text-pink-300 hover:text-pink-500 hover:bg-pink-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                        </button>
                        <button onclick="deleteTask('${task.id}')" class="action-btn p-2 rounded-xl text-pink-300 hover:text-red-500 hover:bg-red-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </div>
            `;

            // Drag for Desktop
            div.addEventListener('dragstart', (e) => {
                if(e.target.tagName === 'TEXTAREA' || e.target.closest('button') || e.target.classList.contains('card-dot')) { e.preventDefault(); return; }
                e.dataTransfer.setData('text/plain', task.id);
                setTimeout(() => div.classList.add('dragging'), 0);
            });
            div.addEventListener('dragend', () => div.classList.remove('dragging'));

            // Swipe for Mobile
            let touchStartX = 0;
            let touchStartY = 0;
            div.addEventListener('touchstart', (e) => {
                if(e.target.closest('button') || e.target.closest('.card-dot') || e.target.tagName === 'TEXTAREA') return;
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            div.addEventListener('touchend', (e) => {
                if(e.target.closest('button') || e.target.closest('.card-dot') || e.target.tagName === 'TEXTAREA') return;
                const diffX = e.changedTouches[0].screenX - touchStartX;
                const diffY = e.changedTouches[0].screenY - touchStartY;
                
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
                    const idx = columns.indexOf(task.status);
                    if (diffX < -50 && idx < 2) { 
                        div.classList.add('swipe-out-left');
                        setTimeout(() => { task.status = columns[idx + 1]; saveTasks(); renderTasks(); }, 200);
                    } else if (diffX > 50 && idx > 0) { 
                        div.classList.add('swipe-out-right');
                        setTimeout(() => { task.status = columns[idx - 1]; saveTasks(); renderTasks(); }, 200);
                    }
                }
            }, { passive: true });

            return div;
        }

        function toggleEdit(id) {
            const textEl = document.getElementById(`text-${id}`);
            const inputEl = document.getElementById(`edit-input-${id}`);
            const btnEl = document.getElementById(`btn-edit-${id}`);
            const card = document.getElementById(`task-${id}`);
            if (inputEl.classList.contains('hidden')) {
                inputEl.classList.remove('hidden'); textEl.classList.add('hidden');
                inputEl.focus(); btnEl.classList.add('text-pink-600', 'bg-pink-50', 'opacity-100');
                card.draggable = false;
            } else {
                const newText = inputEl.value.trim();
                if (newText) {
                    tasks.find(t => t.id === id).text = newText;
                    saveTasks();
                    textEl.innerText = newText;
                }
                inputEl.classList.add('hidden'); textEl.classList.remove('hidden');
                btnEl.classList.remove('text-pink-600', 'bg-pink-50', 'opacity-100'); card.draggable = true;
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function allowDrop(e) { e.preventDefault(); const col = e.target.closest('.kanban-column'); if (col) col.classList.add('drop-target'); }
        function dragLeave(e) { const col = e.target.closest('.kanban-column'); if (col) col.classList.remove('drop-target'); }
        function drop(e) {
            e.preventDefault();
            const colEl = e.target.closest('.kanban-column');
            if (!colEl) return;
            colEl.classList.remove('drop-target');
            const taskId = e.dataTransfer.getData('text/plain');
            const task = tasks.find(t => t.id === taskId);
            if (task) { task.status = colEl.id; saveTasks(); renderTasks(); }
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text) {
                let status = 'todo';
                if (document.body.classList.contains('is-mobile-view')) {
                    const width = scrollContainer.offsetWidth;
                    const activeIdx = Math.round(scrollContainer.scrollLeft / width);
                    status = columns[activeIdx] || 'todo';
                }
                tasks.push({ id: Date.now().toString(), text, status, priority: 'green' });
                saveTasks();
                renderTasks();
                input.value = '';
            }
        }

        document.getElementById('addTaskBtn').addEventListener('click', addTask);
        document.getElementById('taskInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
        window.addEventListener('resize', handleResponsiveLayout);
        window.onload = () => { handleResponsiveLayout(); renderTasks(); };
    </script>
</body>
</html>
